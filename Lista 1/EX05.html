<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05</title>
</head>
<body>
    <header>
        <h1>Exercício 5: Calculadora simples</h1> <!--Título-->
    </header>
    <label>Digite primeiro valor: <!--Texto exibido para o usuário-->
    <input type="number" id="entrada1"> <!--Entrada do primeiro valor (diferentes tipos, nesse caso "número")-->
    <br>
    
    <label>Digite o segundo valor:
    <input type="number" id="entrada2">
    <br>
    
    <label>Digite a operação desejada:
    <input type="text" id="entrada3">
    <br>
    
    <button onclick="executar()"> Executar </button> <!--Botão para execução da tarefa :)-->
    <pre id="saida"></pre> <!--Campo de texto pré formatado-->

    <script> //Início do JavaScript
    function executar() {
        let valora = document.getElementById('entrada1').value;
        let valorb = document.getElementById('entrada2').value;
        let operacao = document.getElementById('entrada3').value;

        let numa = parseInt(valora);
        let numb = parseInt(valorb);
        let resultado = '';

    if(isNaN(numa) || isNaN(numb)){
        resultado = 'Digite número válidos';
    }else{
        if(operacao == '+'){
            resultado = numa + numb;
        } else{
            if(operacao == '-'){
                resultado = numa - numb;
            } else{
                if(operacao == '*'){
                    resultado = numa * numb;
                } else{
                    if(operacao == '/'){
                        resultado = numa / numb;
                    } else{
                        resultado = 'Operação inválida';
                    }
                }
            }    
        }
    }
    document.getElementById('saida').textContent = resultado; 
}
        
    </script>
</body>
</html>
