<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04</title>
</head>
<body>
    <header>
        <h1>Exercício 4: Coversão de temperaturas</h1> <!--Título-->
    </header>
    <label>Digite uma temperatura em Celcius: <!--Texto exibido para o usuário-->
        <input type="number" id="entrada1"> <!--Entrada do primeiro valor (diferentes tipos, nesse caso "número")-->
    <button onclick="executar()"> Executar </button> <!--Botão para execução da tarefa :)-->
    <pre id="saida"></pre> <!--Campo de texto pré formatado-->

    <script> //Início do JavaScript
    function executar() {
        let valora = document.getElementById('entrada1').value;

        let num = parseInt(valora);
        let resultado = '';

            resultado = (num * 1.8) + 32;

        document.getElementById('saida').textContent = 'ºF ' + resultado; 
    }
    </script>
</body>
</html>
