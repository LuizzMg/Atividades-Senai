<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 07</title>
</head>
<body>
    <header>
        <h1>Exercício 7: Indicador de maior número</h1> <!--Título-->
    </header>
    <label>Digite o primeiro número: <!--Texto exibido para o usuário-->
    <input type="number" id="entrada1"> <!--Entrada do primeiro valor (diferentes tipos, nesse caso "número")-->
    <br>

    <label>Digite o segundo número:</label>
    <input type="number" id="entrada2">
    <br>
  
    <button onclick="executar()"> Executar </button> <!--Botão para execução da tarefa :)-->
    <pre id="saida"></pre> <!--Campo de texto pré formatado-->

    <script> //Início do JavaScript
    function executar() {
        let valora = document.getElementById('entrada1').value;
        let valorb = document.getElementById('entrada2').value;

        let numa = parseInt(valora);
        let numb = parseInt(valorb);
        let resultado = '';
        
            if(isNaN(numa) || isNaN(numb)){
                resultado = 'Digite um número válido';
            } else{
                if(numa > numb){
                    resultado = numa;
                } else{
                    if(numb > numa){
                        resultado = numb;
                    } else{
                        resultado = 'Os números são iguais :)';
                    }
                }
            }

        document.getElementById('saida').textContent = resultado;
    }    
    </script>
</body>
</html>
