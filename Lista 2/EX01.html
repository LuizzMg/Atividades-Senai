<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01</title>
</head>
<body>
    <header>
        <h1>Exercício 01: Despertador filosófico:</h1> <!--Título-->
    </header>
    <label>Digite uma número: <!--Texto exibido para o usuário-->
    <input type="number" id="entrada1"> <!--Entrada do primeiro valor (diferentes tipos, nesse caso "número")-->
    <br>
  
    <button onclick="executar()"> Executar </button> <!--Botão para execução da tarefa :)-->
    <pre id="saida"></pre> <!--Campo de texto pré formatado-->

    <script> //Início do JavaScript

    function executar() {
        let resultado = 0;
        let valor = document.getElementById('entrada1').value;
        let n = parseInt(valor);

            if(isNaN(n)){
                resultado = 'Digite um número válido';
            } else{
                    switch(n){
                        case 1:
                            resultado = 'Hoje é Domingo pé de caximbo';
                            break;
                        case 2:
                            resultado = 'Hoje é Segunda dia de pagar boleto';
                            break;
                        case 3:
                            resultado = 'Hoje é Terça, quase quarta';
                            break;
                        case 4:
                            resultado = 'Hoje é quarta, quase quinta';
                            break;
                        case 5:
                            resultado = 'Hoje é quinta, meio de semana';
                            break;
                        case 6:
                            resultado = 'Hoje é sexta, perto da folga';
                            break;
                        case 7:
                            resultado = 'Hoje é sábado, final de semana';
                            break;
                            
            }
        }

        if(n < 1 || n >7){
            resultado = n + ' Não é um dia da semana! Digite novamente.';
        }
        document.getElementById('saida').textContent = resultado;
    }    
    </script>
</body>
</html>
