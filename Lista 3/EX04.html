<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04</title>
</head>
<body>
    <header>
        <h1>Volume do cubo:</h1> 
    </header>

    <label>Informe o Comprimento de um dos vértices do cubo (cm):</label>
    <input type="number" id="v">
    <br>

    <button onclick="executar()">Executar</button>
    <pre id="saida"></pre>

    <script>
        function executar() {
            let vertice = document.getElementById('v').value;
            let v = parseInt(vertice);

            let res = 0;

            if(isNaN(v) || v < 0) {
                res = 'Digite um número válido.';
            } else {
                res = 'O volume do cubo é: ' + (v * v * v) + 'cm³';
            }
            document.getElementById('saida').textContent = res;
        }
    </script>
