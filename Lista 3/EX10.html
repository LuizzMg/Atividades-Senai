<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 09</title>
</head>
<body>
    <header>
        <h1>Volume de um cone:</h1> 
    </header>

    <label>Informe a altura do cone (cm):</label>
    <input type="number" id="v1">
    <br>

    <label>Informe o raio do cone (cm):</label>
    <input type="number" id="v2">
    <br>

    <button onclick="executar()">Executar</button>
    <pre id="saida"></pre>

    <script>
        function executar(){
            let altura = document.getElementById('v1'). value;
            let raio = document.getElementById('v2').value;

            let a = parseInt(altura);
            let r = parseInt(raio);
            let pi = 3.14159;
            let res = 0;
            let v = 0;

            if(isNaN(a) || isNaN(r)){
                res = 'Digite um número válido';
            } else{
                if (a < 1 || r < 1){
                    res = 'Digite um número positivo/maior que "0".';
                } else{
                    v = (1 / 3) * pi * (r * r) * a;
                    res = 'O volume do cone é : ' + v + 'cm³.';
                }
            }
            document.getElementById('saida').textContent = res;
        }
    </script>
