<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 09</title>
</head>
<body>
    <header>
        <h1>Área das superfícies de um cone:</h1> 
    </header>

    <label>Informe a altura do cone (cm):</label>
    <input type="number" id="v1">
    <br>

    <label>Informe o raio do cone (cm):</label>
    <input type="number" id="v2">
    <br>

    <button onclick="executar()">Executar</button>
    <pre id="saida"></pre>

    <script>
        function executar(){
            let altura = document.getElementById('v1'). value;
            let raio = document.getElementById('v2').value;

            let a = parseInt(altura);
            let r = parseInt(raio);
            let pi = 3.14159;
            let res = 0;
            let g = 0;
            let Af = 0

            if(isNaN(a) || isNaN(r)){
                res = 'Informe valores válidos';
            } else{
                if(a < 1 || r < 1){
                    res = 'informe valores positivos/maiores que "0".';
                } else{
                    g = ((a * a) + (r * r)) ** 0.5;
                    Af = (pi * (r * r)) + (pi * r * g);
                    res = 'A área do cone é: ' + Af + 'cm².';
                }
            }
            document.getElementById('saida'). textContent = res;
        }
    </script>
