<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>
    <header>
        <h1>Conversão de unidade de comprimento:</h1> 
    </header>

    <label>Valor a ser convertido:</label>
    <input type="number" id="n">
    <br>

    <label>Unidade de entrada:</label>
    <select id="Ue">
        <option selected disabled value="ds">Escolha uma unidade de medida</option>
        <option value="mm">Milímetro (mm)</option>
        <option value="cm">Centímetro (cm)</option>
        <option value="m">Metro (m)</option>
        <option value="km">Quilômetro (km)</option>
        <option value="in">Polegada (in)</option>
    </select>
    <br>

    <label>Unidade de saída:</label>
    <select id="Us">
        <option selected disabled value="ds">Escolha uma unidade de medida</option>
        <option value="mm">Milímetro (mm)</option>
        <option value="cm">Centímetro (cm)</option>
        <option value="m">Metro (m)</option>
        <option value="km">Quilômetro (km)</option>
        <option value="in">Polegada (in)</option>
    </select>
    <br>

    <button onclick="executar()">Executar</button>
    <pre id="saida"></pre>
